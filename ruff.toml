line-length = 120
target-version = "py312"

[lint]
select = ["E", "F", "I", "UP", "W"]
ignore = [
    "E501",   # line too long — handled by formatter
    "UP007",  # X | Y union syntax — keep Optional[] for clarity
]

[lint.per-file-ignores]
"db_builders/*" = ["E402"]      # sys.path manipulation before imports
"evals/*"   = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
